# ai-coding-ok: v3.1.0
# ai-coding-ok — 项目元信息
# 此文件为机器可读的项目元信息，供 CI/CD、Agent 和工具使用

project:
  name: "ai-coding-ok"
  description: "AI 编程护栏 Skill 框架——为任意项目安装三层记忆系统并强制执行 PDCA 工作流"
  version: "3.0.1"
  stage: "production"  # development / staging / production
  created: "2026-04-19"
  user_scale: "面向所有使用 Claude Code / Copilot / Cursor 的开发者"
  design_principle: "可靠 > 易用 > 简洁；硬约束 > 软建议"

tech_stack:
  language: "Shell + Python 3 + Markdown"
  language_version: "Python 3.8+"
  backend_framework: "无（非 Web 项目）"
  frontend: "无（非 Web 项目）"
  orm: "无"
  database: "无"
  database_driver: "无"
  test_framework: "Shell verify.sh"
  config: ".claude/settings.local.json（Claude Code hooks）"
  package_manager: "无（git clone 即用）"

code_quality:
  formatter: "prettier / 手动（Markdown），ruff（Python）"
  linter: "shellcheck（Shell），ruff（Python）"
  type_checker: "无（非代码密集型项目）"
  test_framework: "Shell verify.sh"
  min_coverage: 0  # 非代码项目，无覆盖率指标

commands:
  install: "bash install.sh"
  dev: "无需启动（Skill 框架，通过 Claude Code / Copilot 加载）"
  test: "bash scripts/verify.sh"
  test_coverage: "N/A"
  lint: "shellcheck install.sh scripts/*.sh"
  format: "prettier --write '**/*.md'"

structure:
  source_dir: "templates"
  test_dir: "N/A"
  docs_dir: "docs"
  scripts_dir: "scripts"

conventions:
  commit_format: "conventional-commits"
  branch_strategy: "github-flow"
  code_review: "recommended"
